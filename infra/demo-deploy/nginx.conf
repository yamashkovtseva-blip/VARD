# Vard demo — nginx server block.
# Listens on 8080 (non-privileged so the container can run as non-root).
# TLS termination is expected upstream (Caddy / Traefik / cloud LB).

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 25m;

    # ── Security headers ────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-Frame-Options        "DENY"                    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # CSP — permissive enough for Monaco/Vite output, tighten as you can.
    # `unsafe-eval` is required by Monaco's worker loader.
    add_header Content-Security-Policy "default-src 'self'; \
script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; \
style-src 'self' 'unsafe-inline'; \
font-src 'self' data:; \
img-src 'self' data: blob:; \
worker-src 'self' blob:; \
connect-src 'self' ws: wss:; \
frame-ancestors 'none'; \
base-uri 'self'; \
form-action 'self';" always;

    # ── Compression ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/wasm
        application/xml+rss application/atom+xml image/svg+xml;

    # ── Cache hashed Vite assets aggressively ───────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(woff2?|ttf|otf|eot|png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Backend API proxy ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # ── Yjs / collaboration websocket ───────────────────────────
    location /ws {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── SPA shell must always be re-validated ───────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # ── Client-side routing fallback ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Block dotfiles, backups, source maps in prod ────────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~* \.(map|bak|swp|orig)$ {
        deny all;
        return 404;
    }
}
