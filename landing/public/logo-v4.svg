<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!--
    Geometry: 1 perfect axis-aligned navy square + 4 elongated cardinal rhombuses.
    Square: (60,60) → (140,140), side 80.
    Rhombuses: tip at viewbox edge, base on the square edge midpoint.
    4 white separator lines run along the cardinal axes from tip to center,
    crossing through both the rhombus and the navy square.
  -->
  <defs>
    <!-- Navy square gradient (upper-left bright → lower-right dark) -->
    <linearGradient id="navyGrad" x1="60" y1="60" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7283C8"/>
      <stop offset="1" stop-color="#2B3A8B"/>
    </linearGradient>

    <!-- Green rhombus radial gradients (dark center → light outer tip) -->
    <radialGradient id="greenLite" cx="100" cy="100" r="92" gradientUnits="userSpaceOnUse">
      <stop offset="0.40" stop-color="#3D9B8E"/>
      <stop offset="1.00" stop-color="#7AD4C2"/>
    </radialGradient>
    <radialGradient id="greenDark" cx="100" cy="100" r="92" gradientUnits="userSpaceOnUse">
      <stop offset="0.40" stop-color="#1F6E66"/>
      <stop offset="1.00" stop-color="#4DAB9F"/>
    </radialGradient>
  </defs>

  <!-- 1. Central navy square (perfect, axis-aligned) -->
  <rect x="60" y="60" width="80" height="80" fill="url(#navyGrad)"/>

  <!-- 2. Four cardinal rhombuses, each split into 2 facets by the cardinal axis -->
  <!-- N rhombus: tip(100,8), waists(88,34)/(112,34), base(100,60) -->
  <polygon points="100,8 88,34 100,60"  fill="url(#greenLite)"/>
  <polygon points="100,8 112,34 100,60" fill="url(#greenDark)"/>

  <!-- E rhombus: tip(192,100), waists(166,88)/(166,112), base(140,100) -->
  <polygon points="192,100 166,88 140,100"  fill="url(#greenLite)"/>
  <polygon points="192,100 166,112 140,100" fill="url(#greenDark)"/>

  <!-- S rhombus -->
  <polygon points="100,192 88,166 100,140"  fill="url(#greenLite)"/>
  <polygon points="100,192 112,166 100,140" fill="url(#greenDark)"/>

  <!-- W rhombus -->
  <polygon points="8,100 34,88 60,100"  fill="url(#greenLite)"/>
  <polygon points="8,100 34,112 60,100" fill="url(#greenDark)"/>

  <!-- 3. Four white separator lines · cardinal tips → center -->
  <g stroke="#FFFFFF" stroke-width="1.1" stroke-opacity="0.92" stroke-linecap="round">
    <line x1="100" y1="8"   x2="100" y2="100"/>
    <line x1="192" y1="100" x2="100" y2="100"/>
    <line x1="100" y1="192" x2="100" y2="100"/>
    <line x1="8"   y1="100" x2="100" y2="100"/>
  </g>
</svg>
